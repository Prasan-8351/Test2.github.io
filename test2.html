<!DOCTYPE html>
<html>
<head>
    <title>Business Web Form</title>
</head>
<body>

    <h2>Business Contact Form</h2>

    <form action="#" method="post">

        <!-- Full Name -->
        <label>Full Name:</label><br>
        <input type="text" name="fullname" required><br><br>

        <!-- Email -->
        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <!-- Phone -->
        <label>Phone Number:</label><br>
        <input type="tel" name="phone"><br><br>

        <!-- Source Business (Text Field) -->
        <label>Source Business:</label><br>
        <input type="text" name="source_business" 
               placeholder="Enter source business name" 
               required><br><br>

        <!-- Source Website -->
        <label>Source Business Website:</label><br>
        <input type="url" name="source_website" 
               placeholder="https://example.com"><br><br>

        <!-- Message -->
        <label>Message:</label><br>
        <textarea name="message" rows="4" cols="30" required></textarea><br><br>

        <!-- Submit -->
        <input type="submit" value="Submit">

    </form>
<script>

    widget.async = true;
    document.body.appendChild(widget);
  })();
</script>
</body>
</html>
